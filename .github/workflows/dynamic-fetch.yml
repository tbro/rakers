name: dynamic-script-fetch-test

on:
  push:
    branches: [ feature/auto-fetch-on-append ]

jobs:
  dynamic-fetch:
    name: Dynamic fetch smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --verbose
      - name: Run dynamic-fetch script
        run: ./scripts/run_dynamic_fetch_test.sh
